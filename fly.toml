app = 'perplexica-app'
primary_region = 'sjc'
kill_signal = 'SIGTERM'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'rolling'

[env]
  PORT = '8910'
  NODE_ENV = 'production'
  DATA_DIR = '/app/data'

[http_service]
  internal_port = 8910
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 500
    soft_limit = 400

[[http_service.checks]]
  interval = '30s'
  timeout = '5s'
  grace_period = '15s'
  method = 'GET'
  path = '/api/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

[mounts]
  source = 'perplexica_data'
  destination = '/app/data'
