app = 'perplexica-search'
primary_region = 'sjc'
kill_signal = 'SIGTERM'

[build]

[deploy]

[env]
  PHX_HOST = 'perplexica-search.fly.dev'
  PHX_SERVER = 'true'
  PORT = '8080'
  ECTO_IPV6 = 'true'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

[[http_service.checks]]
  interval = '30s'
  timeout = '5s'
  grace_period = '15s'
  method = 'GET'
  path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
